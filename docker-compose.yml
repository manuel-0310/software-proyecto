# Orquesta todos los servicios de Weddy: backend, Prometheus, Grafana y Jaeger
services:

  weddy-backend:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: weddy-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=weddy_secret_key_2024
      - JAEGER_HOST=jaeger
      - JAEGER_ENABLED=true
    depends_on:
      jaeger:
        condition: service_started
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - weddy-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: weddy-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - weddy-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: weddy-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - weddy-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: weddy-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - weddy-net
    restart: unless-stopped

  # ─── Centralización de logs (ELK/EFK ligero con Loki) ─────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: weddy-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - weddy-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: weddy-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - weddy-net
    restart: unless-stopped

networks:
  weddy-net:
    driver: bridge

volumes:
  grafana-data:
