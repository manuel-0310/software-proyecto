# Pipeline de Despliegue Continuo: push a DockerHub cuando CI pasa en main
#
# Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
#   DOCKERHUB_USERNAME → Tu nombre de usuario en hub.docker.com (ej: manuel0310)
#   DOCKERHUB_TOKEN    → Access token de DockerHub
#                        Generarlo en: hub.docker.com → Account Settings → Security → New Access Token

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:

  # ─── Job 1: Build y push de la imagen a DockerHub ──────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Solo ejecutar si el CI pasó exitosamente
    if: github.event.workflow_run.conclusion == 'success'

    outputs:
      image_tag: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login a DockerHub
        # DOCKERHUB_USERNAME y DOCKERHUB_TOKEN deben estar configurados en GitHub Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./services
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/weddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/weddy-backend:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Simular despliegue y notificar en el commit ────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Simular despliegue
        run: |
          echo "✅ Imagen publicada: ${{ secrets.DOCKERHUB_USERNAME }}/weddy-backend:latest"
          echo "🔖 SHA: ${{ github.event.workflow_run.head_sha }}"
          echo ""
          echo "Para desplegar en un cluster Kubernetes ejecutar:"
          echo "  kubectl set image deployment/weddy-backend \\"
          echo "    weddy-backend=${{ secrets.DOCKERHUB_USERNAME }}/weddy-backend:${{ github.event.workflow_run.head_sha }}"
          echo ""
          echo "Para desplegar con docker-compose en un servidor:"
          echo "  docker compose pull && docker compose up -d"

      - name: Comentar en el commit con el resumen del despliegue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const shortSha = sha.substring(0, 7);
            const imageTag = `${{ secrets.DOCKERHUB_USERNAME }}/weddy-backend:${sha}`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: [
                '## 🚀 Despliegue CD — Weddy Backend',
                '',
                `**Commit:** \`${shortSha}\``,
                `**Imagen Docker:** \`${imageTag}\``,
                `**Estado:** ✅ Publicada en DockerHub`,
                '',
                '### Cómo usar esta imagen',
                '```bash',
                `docker pull ${imageTag}`,
                `docker run -p 8000:8000 ${imageTag}`,
                '```',
              ].join('\n'),
            });
