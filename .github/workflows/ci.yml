# Pipeline de Integración Continua: tests, análisis de seguridad y build de imagen Docker
#
# Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
#   SONAR_TOKEN  → Token de SonarCloud (https://sonarcloud.io/account/security)
#                  Crear proyecto en sonarcloud.io con la organización "manuel-0310"
#
# GITHUB_TOKEN es provisto automáticamente por GitHub Actions (no requiere configuración).

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── Job 1: Tests unitarios + cobertura ────────────────────────────────────
  test-backend:
    name: Pytest + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r services/requirements.txt -r services/requirements-dev.txt

      - name: Crear directorio de reportes
        run: mkdir -p services/reports

      - name: Ejecutar tests con cobertura y Allure
        run: |
          cd services
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/coverage-html \
            --html=reports/pytest-report.html \
            --self-contained-html \
            --cov-fail-under=80 \
            --alluredir=reports/allure-results

      - name: Instalar Allure CLI
        if: always()
        run: |
          curl -sLo allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generar reporte Allure
        if: always()
        run: allure generate services/reports/allure-results -o services/reports/allure-report --clean

      - name: Subir reportes de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-reports
          path: services/reports/

      - name: Subir reporte Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: services/reports/allure-report/

  # ─── Job 2: Pruebas de API con Newman (Postman) ────────────────────────────
  postman-tests:
    name: Newman API Tests
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del backend
        run: pip install -r services/requirements.txt

      - name: Levantar backend en background
        run: |
          cd services
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          echo "Backend PID: $!"

      - name: Esperar que el backend esté listo
        run: sleep 5

      - name: Instalar Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Ejecutar colección Postman
        run: |
          mkdir -p reports
          newman run tests/api/weddy.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman-report.html

      - name: Subir reporte Newman
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/newman-report.html

  # ─── Job 3: Prueba de carga con k6 ────────────────────────────────────────
  load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    needs: postman-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del backend
        run: pip install -r services/requirements.txt

      - name: Levantar backend en background
        run: |
          cd services
          uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Esperar que el backend esté listo
        run: sleep 5

      - name: Instalar k6
        uses: grafana/setup-k6-action@v1

      - name: Ejecutar prueba de carga
        run: |
          mkdir -p reports
          k6 run tests/load/load_test.js --out json=reports/k6-results.json
        continue-on-error: true

      - name: Subir resultados k6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: reports/k6-results.json

  # ─── Job 4: Análisis SAST con Semgrep + SonarCloud ─────────────────────────
  sast-analysis:
    name: SAST Analysis
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: pytest-reports
          path: services/reports/

      - name: Ejecutar Semgrep
        run: |
          mkdir -p reports
          semgrep --config=auto services/ --json > reports/semgrep-report.json || true

      - name: Análisis SonarCloud
        # SONAR_TOKEN: Token de sonarcloud.io → Account → Security → Generate Token
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Subir reporte Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep-report.json

  # ─── Job 5: Escaneo de secretos con Gitleaks ──────────────────────────────
  secrets-scan:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout con historial completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear secretos con Gitleaks
        # GITHUB_TOKEN es automático; no requiere configuración manual
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 6: Verificación de vulnerabilidades en dependencias ──────────────
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Safety
        run: pip install safety

      - name: Verificar vulnerabilidades
        run: |
          mkdir -p reports
          safety check -r services/requirements.txt --json > reports/safety-report.json || true

      - name: Subir reporte Safety
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: reports/safety-report.json

  # ─── Job 7: Pruebas de GUI con Cypress ────────────────────────────────────
  cypress-tests:
    name: Cypress GUI Tests
    runs-on: ubuntu-latest
    needs: postman-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del backend
        run: pip install -r services/requirements.txt

      - name: Levantar backend en background
        run: |
          cd services
          uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Esperar que el backend esté listo
        run: sleep 5

      - name: Instalar Cypress
        run: |
          cd tests/gui
          npm install

      - name: Ejecutar pruebas Cypress
        run: |
          cd tests/gui
          mkdir -p cypress/results
          npx cypress run --headless
        continue-on-error: true

      - name: Subir resultados Cypress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            tests/gui/cypress/results/
            tests/gui/cypress/screenshots/
        continue-on-error: true

  # ─── Job 8: DAST con OWASP ZAP ────────────────────────────────────────────
  dast-zap:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del backend
        run: pip install -r services/requirements.txt

      - name: Levantar backend en background
        run: |
          cd services
          uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Esperar que el backend esté listo
        run: sleep 5

      - name: Crear directorio de reportes
        run: mkdir -p reports

      - name: Ejecutar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:8000'
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: Subir reporte ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
        continue-on-error: true

  # ─── Job 9: Build y escaneo de imagen Docker con Trivy ────────────────────
  docker-build:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [test-backend, postman-tests, sast-analysis, secrets-scan, dependency-check, cypress-tests, dast-zap]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Docker
        run: |
          docker build -t weddy-backend:${{ github.sha }} ./services

      - name: Escanear imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: weddy-backend:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Subir reporte Trivy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
        continue-on-error: true
