# Secretos del backend: clave JWT y configuración de entorno
# En producción generar con: kubectl create secret generic weddy-secret \
#   --from-literal=SECRET_KEY=$(openssl rand -hex 32) -n weddy
apiVersion: v1
kind: Secret
metadata:
  name: weddy-secret
  namespace: weddy
type: Opaque
stringData:
  SECRET_KEY: "weddy-k8s-secret-key-cambiar-en-produccion"
  JAEGER_ENABLED: "true"
  JAEGER_HOST: "weddy-jaeger"
